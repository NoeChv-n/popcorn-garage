<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>popcorn-garage</title>
  </head>
  <body>
    <div id="app"></div>
    <div id="menu-ecran">
      <h1>POPCORN GARAGE</h1>
      <div id="ecran-chargement">
  <h2 id="texte-chargement">Chargement en cours : 0%</h2>
</div>
      <button id="bouton-play">ENTRER DANS LE GARAGE</button>
    </div>

    <div id="compteur-score">Trouvés : 0 / 13</div>

    <div id="fenetre-question" class="modal-jeu" style="display: none;">
      <h2>Quel est ce film ?</h2>
      <input type="text" id="input-reponse" placeholder="Titre du film...">
      <button id="btn-valider">Valider</button>
      <p id="msg-erreur" style="display: none; color: #ff4444; margin-top: 10px;">Mauvaise réponse, essaie encore !</p>
      <br><br>
      <button class="btn-retour">Retour</button>
    </div>

    <div id="fenetre-info" class="modal-jeu" style="display: none;">
      <h2 id="info-titre">Bravo !</h2>
      <p id="info-desc">Explication du film ici...</p>
      <button class="btn-retour">Retour au garage</button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
